name: CD Pipeline

on:
  workflow_run:
    workflows: ["CI Tests"]
    types: [completed]
    branches: [master]

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/k-bilaluddin/jobvault-api
  WORKER_IMAGE: ghcr.io/k-bilaluddin/jobvault-worker

permissions:
  contents: read
  packages: write

jobs:
  # ================================
  # Build & Push API Image
  # ================================
  build-api:
    name: Build & Push API
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.API_IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/api.Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ================================
  # Build & Push Worker Image
  # ================================
  build-worker:
    name: Build & Push Worker
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.WORKER_IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/worker.Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ================================
  # Deploy on Self-Hosted Runner
  # ================================
  deploy:
    name: Deploy
    runs-on: [self-hosted, Windows]
    needs: [build-api, build-worker]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create root .env for Docker Compose
        shell: pwsh
        working-directory: ${{ github.workspace }}
        env:
          AUTH_EMAIL: ${{ secrets.AUTH_EMAIL }}
          AUTH_PASSWORD_HASH: ${{ secrets.AUTH_PASSWORD_HASH }}
          AUTH_JWT_SECRET: ${{ secrets.AUTH_JWT_SECRET }}
          CORS_ALLOWED_ORIGINS: ${{ secrets.CORS_ALLOWED_ORIGINS }}
          MONGODB_CONNECTION_STRING: ${{ secrets.MONGODB_CONNECTION_STRING }}
          MONGODB_DATABASE_NAME: ${{ secrets.MONGODB_DATABASE_NAME }}
          MONGODB_JOB_APPLICATIONS_COLLECTION: ${{ secrets.MONGODB_JOB_APPLICATIONS_COLLECTION }}
          MONGODB_NOTIFICATIONS_COLLECTION: ${{ secrets.MONGODB_NOTIFICATIONS_COLLECTION }}
          RABBITMQ_CONNECTION_STRING: ${{ secrets.RABBITMQ_CONNECTION_STRING }}
          RABBITMQ_EXCHANGE_NAME: ${{ secrets.RABBITMQ_EXCHANGE_NAME }}
          RABBITMQ_DEAD_LETTER_EXCHANGE_NAME: ${{ secrets.RABBITMQ_DEAD_LETTER_EXCHANGE_NAME }}
          RABBITMQ_DEAD_LETTER_QUEUE_NAME: ${{ secrets.RABBITMQ_DEAD_LETTER_QUEUE_NAME }}
          RABBITMQ_JOB_APPLICATION_CREATED_QUEUE: ${{ secrets.RABBITMQ_JOB_APPLICATION_CREATED_QUEUE }}
          RABBITMQ_JOB_APPLICATION_UPDATED_QUEUE: ${{ secrets.RABBITMQ_JOB_APPLICATION_UPDATED_QUEUE }}
          RABBITMQ_JOB_APPLICATION_RECEIVED_QUEUE: ${{ secrets.RABBITMQ_JOB_APPLICATION_RECEIVED_QUEUE }}
          RABBITMQ_SSE_NOTIFICATIONS_QUEUE: ${{ secrets.RABBITMQ_SSE_NOTIFICATIONS_QUEUE }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          APP_GH_TOKEN: ${{ secrets.APP_GH_TOKEN }}
          APP_GH_OWNER: ${{ secrets.APP_GH_OWNER }}
          APP_GH_REPOSITORY: ${{ secrets.APP_GH_REPOSITORY }}
          APP_GH_BRANCH: ${{ secrets.APP_GH_BRANCH }}
        run: |
          @"
          AUTH_EMAIL=$env:AUTH_EMAIL
          AUTH_PASSWORD_HASH=$env:AUTH_PASSWORD_HASH
          AUTH_JWT_SECRET=$env:AUTH_JWT_SECRET
          CORS_ALLOWED_ORIGINS=$env:CORS_ALLOWED_ORIGINS
          MONGODB_CONNECTION_STRING=$env:MONGODB_CONNECTION_STRING
          MONGODB_DATABASE_NAME=$env:MONGODB_DATABASE_NAME
          MONGODB_JOB_APPLICATIONS_COLLECTION=$env:MONGODB_JOB_APPLICATIONS_COLLECTION
          MONGODB_NOTIFICATIONS_COLLECTION=$env:MONGODB_NOTIFICATIONS_COLLECTION
          RABBITMQ_CONNECTION_STRING=$env:RABBITMQ_CONNECTION_STRING
          RABBITMQ_EXCHANGE_NAME=$env:RABBITMQ_EXCHANGE_NAME
          RABBITMQ_DEAD_LETTER_EXCHANGE_NAME=$env:RABBITMQ_DEAD_LETTER_EXCHANGE_NAME
          RABBITMQ_DEAD_LETTER_QUEUE_NAME=$env:RABBITMQ_DEAD_LETTER_QUEUE_NAME
          RABBITMQ_JOB_APPLICATION_CREATED_QUEUE=$env:RABBITMQ_JOB_APPLICATION_CREATED_QUEUE
          RABBITMQ_JOB_APPLICATION_UPDATED_QUEUE=$env:RABBITMQ_JOB_APPLICATION_UPDATED_QUEUE
          RABBITMQ_JOB_APPLICATION_RECEIVED_QUEUE=$env:RABBITMQ_JOB_APPLICATION_RECEIVED_QUEUE
          RABBITMQ_SSE_NOTIFICATIONS_QUEUE=$env:RABBITMQ_SSE_NOTIFICATIONS_QUEUE
          TELEGRAM_BOT_TOKEN=$env:TELEGRAM_BOT_TOKEN
          TELEGRAM_CHAT_ID=$env:TELEGRAM_CHAT_ID
          APP_GH_TOKEN=$env:APP_GH_TOKEN
          APP_GH_OWNER=$env:APP_GH_OWNER
          APP_GH_REPOSITORY=$env:APP_GH_REPOSITORY
          APP_GH_BRANCH=$env:APP_GH_BRANCH
          "@ | Set-Content -Path .env -Encoding utf8

      - name: Verify .env exists
        shell: pwsh
        working-directory: ${{ github.workspace }}
        run: |
          if (-not (Test-Path -Path .env -PathType Leaf)) {
            throw "Required .env file was not created."
          }

      - name: Ensure jobvault-internal network exists
        shell: pwsh
        run: |
          docker network inspect jobvault-internal 2>&1 | Out-Null
          if ($LASTEXITCODE -ne 0) {
            docker network create jobvault-internal
          }

      - name: Deploy with Docker Compose
        shell: pwsh
        working-directory: ${{ github.workspace }}
        run: |
          docker compose pull
          docker compose up -d

      - name: Notify Telegram
        shell: pwsh
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          $message = "🚀 JobVault deployed`nCommit: ${{ github.sha }}`nBy: ${{ github.actor }}"
          Invoke-RestMethod -Method Post -Uri "https://api.telegram.org/bot$env:TELEGRAM_BOT_TOKEN/sendMessage" -Body @{
            chat_id = $env:TELEGRAM_CHAT_ID
            text    = $message
          } | Out-Null
