name: CI/CD Pipeline

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/k-bilaluddin/jobvault-api
  WORKER_IMAGE: ghcr.io/k-bilaluddin/jobvault-worker
  
permissions:
  contents: read
  packages: write

jobs:
  # ================================
  # Job 1: Test
  # ================================
  test:
    name: Run Architecture Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore dependencies
        working-directory: backend/src/JobVault.API
        run: dotnet restore JobVault.sln

      - name: Build
        working-directory: backend/src/JobVault.API
        run: dotnet build JobVault.sln -c Release --no-restore

      - name: Run tests
        working-directory: backend/src/JobVault.API
        run: dotnet test JobVault.sln --no-build -c Release --verbosity normal

  # ================================
  # Job 2: Build & Push API Image
  # ================================
  build-api:
    name: Build & Push API
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.API_IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/api.Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ================================
  # Job 3: Build & Push Worker Image
  # ================================
  build-worker:
    name: Build & Push Worker
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.WORKER_IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/worker.Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ================================
  # Job 4: Deploy on Self-Hosted Runner
  # ================================
  deploy:
    name: Deploy
    runs-on: [self-hosted, Windows]
    needs: [build-api, build-worker]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create root .env for Docker Compose
        shell: pwsh
        working-directory: ${{ github.workspace }}
        env:
          MONGODB_CONNECTION_STRING: ${{ secrets.MONGODB_CONNECTION_STRING }}
          MONGODB_DATABASE_NAME: ${{ secrets.MONGODB_DATABASE_NAME }}
          MONGODB_JOB_APPLICATIONS_COLLECTION_NAME: ${{ secrets.MONGODB_JOB_APPLICATIONS_COLLECTION_NAME }}
          RABBITMQ_CONNECTION_STRING: ${{ secrets.RABBITMQ_CONNECTION_STRING }}
          RABBITMQ_EXCHANGE_NAME: ${{ secrets.RABBITMQ_EXCHANGE_NAME }}
          RABBITMQ_JOB_APPLICATION_CREATED_QUEUE_NAME: ${{ secrets.RABBITMQ_JOB_APPLICATION_CREATED_QUEUE_NAME }}
          RABBITMQ_JOB_APPLICATION_UPDATED_QUEUE_NAME: ${{ secrets.RABBITMQ_JOB_APPLICATION_UPDATED_QUEUE_NAME }}
          RABBITMQ_DEAD_LETTER_QUEUE_NAME: ${{ secrets.RABBITMQ_DEAD_LETTER_QUEUE_NAME }}
          RABBITMQ_DEAD_LETTER_EXCHANGE_NAME: ${{ secrets.RABBITMQ_DEAD_LETTER_EXCHANGE_NAME }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          APP_GH_TOKEN: ${{ secrets.APP_GH_TOKEN }}
          APP_GH_OWNER: ${{ secrets.APP_GH_OWNER }}
          APP_GH_REPOSITORY: ${{ secrets.APP_GH_REPOSITORY }}
          APP_GH_BRANCH: ${{ secrets.APP_GH_BRANCH }}
        run: |
          @"
          MongoDb__ConnectionString=$env:MONGODB_CONNECTION_STRING
          MongoDb__DatabaseName=$env:MONGODB_DATABASE_NAME
          MongoDb__JobApplicationsCollectionName=$env:MONGODB_JOB_APPLICATIONS_COLLECTION_NAME
          RabbitMq__ConnectionString=$env:RABBITMQ_CONNECTION_STRING
          RabbitMq__ExchangeName=$env:RABBITMQ_EXCHANGE_NAME
          RabbitMq__JobApplicationCreatedQueueName=$env:RABBITMQ_JOB_APPLICATION_CREATED_QUEUE_NAME
          RabbitMq__JobApplicationUpdatedQueueName=$env:RABBITMQ_JOB_APPLICATION_UPDATED_QUEUE_NAME
          RabbitMq__DeadLetterQueueName=$env:RABBITMQ_DEAD_LETTER_QUEUE_NAME
          RabbitMq__DeadLetterExchangeName=$env:RABBITMQ_DEAD_LETTER_EXCHANGE_NAME
          Telegram__BotToken=$env:TELEGRAM_BOT_TOKEN
          Telegram__ChatId=$env:TELEGRAM_CHAT_ID
          GitHub__Token=$env:APP_GH_TOKEN
          GitHub__Owner=$env:APP_GH_OWNER
          GitHub__Repository=$env:APP_GH_REPOSITORY
          GitHub__Branch=$env:APP_GH_BRANCH
          "@ | Set-Content -Path .env -Encoding utf8

      - name: Verify .env exists
        shell: pwsh
        working-directory: ${{ github.workspace }}
        run: |
          if (-not (Test-Path -Path .env -PathType Leaf)) {
            throw "Required .env file was not created."
          }

      - name: Deploy with Docker Compose
        shell: pwsh
        working-directory: ${{ github.workspace }}
        run: |
          docker compose pull
          docker compose up -d

      - name: Notify Telegram
        shell: pwsh
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          $message = "🚀 JobVault deployed`nCommit: ${{ github.sha }}`nBy: ${{ github.actor }}"
          Invoke-RestMethod -Method Post -Uri "https://api.telegram.org/bot$env:TELEGRAM_BOT_TOKEN/sendMessage" -Body @{
            chat_id = $env:TELEGRAM_CHAT_ID
            text    = $message
          } | Out-Null
