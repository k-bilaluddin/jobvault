name: CI Tests

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

permissions:
  contents: read

jobs:
  # ================================
  # Detect which paths changed
  # ================================
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/**'
            frontend:
              - 'frontend/**'
              - '.github/workflows/**'

  # ================================
  # Backend Unit Tests
  # ================================
  backend-unit-tests:
    name: Run Backend Unit Tests
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore dependencies
        working-directory: backend/src/JobVault.API
        run: dotnet restore JobVault.sln

      - name: Build
        working-directory: backend/src/JobVault.API
        run: dotnet build JobVault.sln -c Release --no-restore

      - name: Run unit tests
        working-directory: backend/src/JobVault.API
        run: dotnet test ../../tests/JobVault.UnitTests/JobVault.UnitTests.csproj --no-build -c Release --verbosity normal

  # ================================
  # Architecture Tests
  # ================================
  architecture-tests:
    name: Run Architecture Tests
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore dependencies
        working-directory: backend/src/JobVault.API
        run: dotnet restore JobVault.sln

      - name: Build
        working-directory: backend/src/JobVault.API
        run: dotnet build JobVault.sln -c Release --no-restore

      - name: Run architecture tests
        working-directory: backend/src/JobVault.API
        run: dotnet test ../../tests/JobVault.ArchitectureTests/JobVault.ArchitectureTests.csproj --no-build -c Release --verbosity normal

  # ================================
  # Frontend Tests
  # ================================
  frontend-tests:
    name: Run Frontend Tests
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/jobvault-ui/package-lock.json

      - name: Install dependencies
        working-directory: frontend/jobvault-ui
        run: npm ci

      - name: Run tests
        working-directory: frontend/jobvault-ui
        run: npm test
