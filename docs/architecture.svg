<line x1="802" y1="130" x2="896" y2="130" stroke="#16a34a" stroke-width="1.3" marker-end="url(#arrG)"/>
<text x="849" y="123" class="alG">Convert</text>

<!-- GitHub Vault -->
<g transform="translate(920,260)" filter="url(#sh)">
  <circle r="22" fill="#1e293b"/>
  <rect x="-9" y="0" width="18" height="13" rx="2" fill="none" stroke="white" stroke-width="1.6"/>
  <path d="M-5,0 L-5,-6 A5,5 0 0,1 5,-6 L5,0" fill="none" stroke="white" stroke-width="1.6"/>
  <circle cx="0" cy="6" r="2.5" fill="white"/>
</g>
<text x="920" y="293" class="sn">GitHub Vault</text>
