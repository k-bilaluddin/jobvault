<g transform="translate(840,404)" filter="url(#sh)">
  <circle r="28" fill="#7c3aed"/>
  <circle cx="0" cy="0" r="13" fill="none" stroke="white" stroke-width="2"/>
  <polygon points="-5,-9 12,0 -5,9" fill="white"/>
</g>
<text x="840" y="446" class="sn" text-anchor="middle">SSE Consumer</text>
<text x="840" y="460" class="st" text-anchor="middle">notification.# binding</text>

<!-- Notifications DB (1020,404) -->
<g transform="translate(1020,404)" filter="url(#sh)">
  <circle r="28" fill="#10b981"/>
  <ellipse cx="0" cy="-7" rx="11" ry="4" fill="none" stroke="white" stroke-width="2"/>
  <line x1="-11" y1="-7" x2="-11" y2="7" stroke="white" stroke-width="2"/>
  <line x1="11" y1="-7" x2="11" y2="7" stroke="white" stroke-width="2"/>
  <ellipse cx="0" cy="7" rx="11" ry="4" fill="none" stroke="white" stroke-width="2"/>
</g>
