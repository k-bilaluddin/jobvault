<svg viewBox="0 0 1400 750" xmlns="http://www.w3.org/2000/svg" role="img">
<title>JobVault — Event-Driven Processing Architecture</title>
<desc>Internal architecture showing API ingestion, RabbitMQ event bus, Worker processing pipeline, and notification fan-out.</desc>

<defs>
<style>
  text { font-family: "Segoe UI", system-ui, Arial, sans-serif; }
  .sn { font-size: 11px; font-weight: 600; fill: #1e293b; text-anchor: middle; }
  .st { font-size: 9px; fill: #64748b; text-anchor: middle; }
  .al { font-size: 8px; fill: #475569; text-anchor: middle; }
  .alB { font-size: 8px; fill: #3b82f6; text-anchor: middle; }
  .alG { font-size: 8px; fill: #16a34a; text-anchor: middle; }
  .alP { font-size: 8px; fill: #7c3aed; text-anchor: middle; }
  .alR { font-size: 8px; fill: #dc2626; text-anchor: middle; }
  .alO { font-size: 8px; fill: #ea580c; text-anchor: middle; }
  .zl { font-size: 9px; font-weight: 700; fill: #94a3b8; letter-spacing: 1px; }
  .route { font-size: 7.5px; fill: #ea580c; font-family: "Cascadia Code", "Fira Code", monospace; text-anchor: middle; }
  .ack { font-size: 7px; fill: #16a34a; text-anchor: middle; font-weight: 600; }
</style>
<marker id="arr" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L0,7 L7,3.5z" fill="#94a3b8"/></marker>
<marker id="arrB" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L0,7 L7,3.5z" fill="#3b82f6"/></marker>
<marker id="arrG" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L0,7 L7,3.5z" fill="#16a34a"/></marker>
<marker id="arrP" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L0,7 L7,3.5z" fill="#7c3aed"/></marker>
<marker id="arrR" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L0,7 L7,3.5z" fill="#dc2626"/></marker>
<marker id="arrO" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L0,7 L7,3.5z" fill="#ea580c"/></marker>
<marker id="arrGsm" markerWidth="5" markerHeight="5" refX="4" refY="2.5" orient="auto"><path d="M0,0 L0,5 L5,2.5z" fill="#16a34a" opacity="0.5"/></marker>
<filter id="sh"><feDropShadow dx="0" dy="1.5" stdDeviation="2.5" flood-color="#00000010"/></filter>
<filter id="sh2"><feDropShadow dx="0" dy="2" stdDeviation="3.5" flood-color="#00000012"/></filter>
</defs>

<!-- Background -->
<rect width="1400" height="750" fill="#f8fafc"/>

<!-- Header -->
<rect width="1400" height="48" fill="#0f172a"/>
<text x="20" y="25" style="font-size:17px;font-weight:700;fill:#f8fafc">JobVault</text>
<text x="115" y="26" style="font-size:12px;fill:#94a3b8">— Event-Driven Processing Architecture</text>
<text x="20" y="42" style="font-size:9.5px;fill:#94a3b8">Claude Agent → API → RabbitMQ Topic Exchange → Worker Pipeline → GitHub Vault → Real-time Notifications</text>

<!-- ═══ INPUT ZONE ═══ -->
<rect x="22" y="66" width="270" height="240" rx="10" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1"/>
<text x="36" y="82" class="zl">INPUT</text>

<!-- Claude Agent -->
<g transform="translate(90,130)" filter="url(#sh)">
  <circle r="26" fill="#6366f1"/>
  <path d="M0,-12 L3,-3 L12,0 L3,3 L0,12 L-3,3 L-12,0 L-3,-3Z" fill="white"/>
</g>
<text x="90" y="168" class="sn">Claude Agent</text>
<text x="90" y="180" class="st">Evaluate · score · payload</text>

<!-- API -->
<g transform="translate(210,130)" filter="url(#sh)">
  <circle r="26" fill="#3b82f6"/>
  <rect x="-11" y="-10" width="22" height="6" rx="1.5" fill="white"/>
  <rect x="-11" y="-1" width="22" height="6" rx="1.5" fill="white"/>
  <rect x="-11" y="7" width="22" height="6" rx="1.5" fill="white"/>
</g>
<text x="210" y="168" class="sn">JobVault API</text>
<text x="210" y="180" class="st">.NET 9 · ASP.NET Core</text>

<!-- Arrow: Agent → API -->
<line x1="116" y1="130" x2="182" y2="130" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrB)"/>
<text x="149" y="123" class="alB">POST /ingest</text>

<!-- Arrow: API → RabbitMQ -->
<line x1="236" y1="130" x2="358" y2="130" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrB)"/>
<text x="297" y="120" class="alB">Publish</text>
<text x="297" y="143" class="route">job.application.received</text>

<!-- MongoDB (API side — initial persist) -->
<g transform="translate(210,250)" filter="url(#sh)">
  <circle r="22" fill="#10b981"/>
  <ellipse cx="0" cy="-5" rx="9" ry="3.5" fill="none" stroke="white" stroke-width="1.6"/>
  <line x1="-9" y1="-5" x2="-9" y2="5" stroke="white" stroke-width="1.6"/>
  <line x1="9" y1="-5" x2="9" y2="5" stroke="white" stroke-width="1.6"/>
  <ellipse cx="0" cy="5" rx="9" ry="3.5" fill="none" stroke="white" stroke-width="1.6"/>
</g>
<text x="210" y="283" class="sn">MongoDB</text>
<text x="210" y="295" class="st">Initial Status: Processing</text>

<!-- Arrow: API → MongoDB -->
<line x1="210" y1="156" x2="210" y2="226" stroke="#94a3b8" stroke-width="1.3" stroke-dasharray="4,3" marker-end="url(#arr)"/>
<text x="230" y="195" class="al">Persist</text>

<!-- ═══ RABBITMQ HUB (enlarged ~15%) ═══ -->
<g transform="translate(430,130)" filter="url(#sh2)">
  <circle r="40" fill="#f97316"/>
  <rect x="-18" y="-12" width="36" height="25" rx="3" fill="none" stroke="white" stroke-width="2.2"/>
  <polyline points="-18,-12 0,7 18,-12" fill="none" stroke="white" stroke-width="2.2"/>
</g>
<text x="430" y="185" style="font-size:13px;font-weight:700;fill:#1e293b;text-anchor:middle">RabbitMQ</text>
<text x="430" y="199" class="st">Topic Exchange</text>
<text x="430" y="211" style="font-size:8px;fill:#ea580c;text-anchor:middle;font-family:'Cascadia Code',monospace">job.applications</text>

<!-- ═══ WORKER BOUNDARY ═══ -->
<rect x="530" y="66" width="520" height="310" rx="12" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5" stroke-dasharray="6,4"/>
<text x="544" y="82" class="zl">WORKER SERVICE</text>
<text x="544" y="94" style="font-size:8px;fill:#64748b">.NET 9 Worker Service</text>

<!-- Queue 1: Received Queue -->
<rect x="548" y="108" width="140" height="36" rx="6" fill="#fff7ed" stroke="#fdba74" stroke-width="1"/>
<text x="618" y="126" style="font-size:8px;font-weight:600;fill:#9a3412;text-anchor:middle">📥 Received Queue</text>
<text x="618" y="138" class="route">job.application.received</text>

<!-- Arrow: RabbitMQ → Received Queue -->
<line x1="470" y1="118" x2="546" y2="118" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arrO)"/>
<text x="508" y="111" class="alO">Consume</text>

<!-- ApplicationIngestionConsumer -->
<g transform="translate(618,190)" filter="url(#sh)">
  <circle r="22" fill="#16a34a"/>
  <circle cx="0" cy="0" r="10" fill="none" stroke="white" stroke-width="1.6"/>
  <polygon points="-4,-7 9,0 -4,7" fill="white"/>
</g>
<text x="618" y="222" class="sn">IngestionConsumer</text>
<text x="618" y="234" class="st">ApplicationIngestionConsumer</text>

<!-- Arrow: queue → consumer -->
<line x1="618" y1="144" x2="618" y2="166" stroke="#16a34a" stroke-width="1.3" marker-end="url(#arrG)"/>

<!-- ACK: IngestionConsumer → RabbitMQ -->
<path d="M596,198 L560,210 L490,210 L480,160" fill="none" stroke="#16a34a" stroke-width="0.8" opacity="0.5" marker-end="url(#arrGsm)"/>
<text x="540" y="222" class="ack">ACK</text>

<!-- Document Generation Service -->
<g transform="translate(780,130)" filter="url(#sh)">
  <circle r="22" fill="#16a34a"/>
  <path d="M-8,-12 L5,-12 L10,-7 L10,12 L-8,12Z" fill="none" stroke="white" stroke-width="1.6"/>
  <path d="M5,-12 L5,-7 L10,-7" fill="none" stroke="white" stroke-width="1.2"/>
  <line x1="-4" y1="-1" x2="6" y2="-1" stroke="white" stroke-width="1"/>
  <line x1="-4" y1="4" x2="6" y2="4" stroke="white" stroke-width="1"/>
</g>
<text x="780" y="163" class="sn">Document Generation</text>
<text x="780" y="175" class="st">Node.js · CV + Cover Letter</text>

<!-- Arrow: Consumer → Generation -->
<line x1="640" y1="182" x2="756" y2="140" stroke="#16a34a" stroke-width="1.3" marker-end="url(#arrG)"/>
<text x="698" y="152" class="alG">Generate</text>

<!-- LibreOffice -->
<g transform="translate(920,130)" filter="url(#sh)">
  <circle r="22" fill="#16a34a"/>
  <path d="M-2,-12 A12,12 0 1,0 12,2" fill="none" stroke="white" stroke-width="2"/>
  <polygon points="12,2 12,-4 6,3" fill="white"/>
</g>
