<text x="1214" y="553" class="bt">Auto-reconnect with backoff</text>

<rect x="1200" y="668" width="330" height="108" rx="8" fill="#fff" stroke="#a855f7" stroke-width="1.6" filter="url(#sh)"/>
<rect x="1200" y="668" width="330" height="22" rx="8" fill="#a855f7"/>
<rect x="1200" y="682" width="330" height="8" fill="#a855f7"/>
<text x="1365" y="685" class="bh" fill="#fff" text-anchor="middle">Vue 3 UI</text>
<text x="1214" y="705" class="bt">Dashboard · Pipeline board · Applications</text>
<text x="1214" y="721" class="bt">Interviews · Skills gap · Bell + unread count</text>
<text x="1214" y="737" class="bt">SSE real-time · PWA · Dark mode</text>
<text x="1214" y="753" class="bt">jobvault.kbilaluddin.dev</text>

