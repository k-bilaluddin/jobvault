<text x="1200" y="237" style="font-size:8px;fill:#475569">= RabbitMQ queue</text>

<line x1="1114" y1="252" x2="1150" y2="252" stroke="#ea580c" stroke-width="1.2" opacity="0.55" stroke-dasharray="8,5"/>
