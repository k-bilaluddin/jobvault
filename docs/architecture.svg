<g transform="translate(920,338)" filter="url(#sh)">
  <circle r="22" fill="#7c3aed"/>
  <polygon points="-11,5 11,0 -11,-5" fill="white"/>
  <polygon points="-11,5 -3,1 -2,7" fill="#7c3aed"/>
</g>
