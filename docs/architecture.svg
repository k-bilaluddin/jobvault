<rect x="548" y="320" width="140" height="36" rx="6" fill="#fff7ed" stroke="#fdba74" stroke-width="1"/>
<text x="618" y="338" style="font-size:8px;font-weight:600;fill:#9a3412;text-anchor:middle">📥 Application Created</text>
<text x="618" y="350" class="route">job.application.created|updated</text>

<!-- Arrow: RabbitMQ → Application Created Queue -->
<path d="M470,155 L500,280 L520,338 L546,338" fill="none" stroke="#ea580c" stroke-width="1.3" marker-end="url(#arrO)"/>
<text x="520" y="320" class="alO">Consume</text>

