<g transform="translate(1020,144)" filter="url(#sh)">
  <circle r="28" fill="#16a34a"/>
  <path d="M-10,-14 L6,-14 L12,-8 L12,14 L-10,14Z" fill="none" stroke="white" stroke-width="2"/>
  <path d="M6,-14 L6,-8 L12,-8" fill="none" stroke="white" stroke-width="1.5"/>
  <line x1="-6" y1="-1" x2="7" y2="-1" stroke="white" stroke-width="1.5"/>
  <line x1="-6" y1="5" x2="7" y2="5" stroke="white" stroke-width="1.5"/>
  <line x1="-6" y1="10" x2="2" y2="10" stroke="white" stroke-width="1.5"/>
</g>
<text x="1020" y="186" class="sn" text-anchor="middle">Generation Service</text>
<text x="1020" y="200" class="st" text-anchor="middle">Node.js · CV + Cover Letter</text>

<!-- LibreOffice (1190,144) -->
<g transform="translate(1190,144)" filter="url(#sh)">
  <circle r="28" fill="#16a34a"/>
  <path d="M-2,-14 A14,14 0 1,0 14,2" fill="none" stroke="white" stroke-width="2.5"/>
  <polygon points="14,2 14,-5 7,4" fill="white"/>
</g>
<text x="1190" y="186" class="sn" text-anchor="middle">LibreOffice</text>
<text x="1190" y="200" class="st" text-anchor="middle">Headless · DOCX → PDF</text>

