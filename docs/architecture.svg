<rect x="1200" y="500" width="330" height="78" rx="8" fill="#fff" stroke="#a855f7" stroke-width="1.6" filter="url(#sh)"/>
<rect x="1200" y="500" width="330" height="22" rx="8" fill="#a855f7"/>
<rect x="1200" y="514" width="330" height="8" fill="#a855f7"/>
