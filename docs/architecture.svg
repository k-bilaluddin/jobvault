<text x="964" y="455" class="bt">Private repository</text>
<text x="964" y="471" class="bt">Atomic 6-file commit</text>
<text x="964" y="487" class="bt">DOCX · PDF · MD reports</text>

<rect x="950" y="668" width="210" height="88" rx="8" fill="#fff" stroke="#10b981" stroke-width="1.6" filter="url(#sh)"/>
<rect x="950" y="668" width="210" height="22" rx="8" fill="#10b981"/>
<rect x="950" y="682" width="210" height="8" fill="#10b981"/>
<text x="1055" y="685" class="bh" fill="#fff" text-anchor="middle">Notifications DB</text>
<text x="964" y="705" class="bt">MongoDB collection</text>
<text x="964" y="721" class="bt">Unread count + recent events</text>

<!-- ── PRESENTATION ── -->
<rect x="1200" y="185" width="330" height="78" rx="8" fill="#fff" stroke="#a855f7" stroke-width="1.6" filter="url(#sh)"/>
<rect x="1200" y="185" width="330" height="22" rx="8" fill="#a855f7"/>
<rect x="1200" y="199" width="330" height="8" fill="#a855f7"/>
