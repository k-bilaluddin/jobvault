<line x1="688" y1="338" x2="756" y2="338" stroke="#7c3aed" stroke-width="1.3" marker-end="url(#arrP)"/>

<!-- ACK: NotificationConsumer → RabbitMQ -->
<path d="M758,330 L700,318 L550,318 L540,310 L490,310 L465,175" fill="none" stroke="#16a34a" stroke-width="0.8" opacity="0.4" marker-end="url(#arrGsm)"/>
