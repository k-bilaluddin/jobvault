  <circle r="28" fill="#10b981"/>
  <ellipse cx="0" cy="-7" rx="11" ry="4" fill="none" stroke="white" stroke-width="2"/>
  <line x1="-11" y1="-7" x2="-11" y2="7" stroke="white" stroke-width="2"/>
  <line x1="11" y1="-7" x2="11" y2="7" stroke="white" stroke-width="2"/>
