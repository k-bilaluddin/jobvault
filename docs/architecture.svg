<g transform="translate(1370,144)" filter="url(#sh)">
  <circle r="28" fill="#1e293b"/>
  <rect x="-11" y="-1" width="22" height="16" rx="2" fill="none" stroke="white" stroke-width="2"/>
  <path d="M-7,-1 L-7,-8 A7,7 0 0,1 7,-8 L7,-1" fill="none" stroke="white" stroke-width="2"/>
  <circle cx="0" cy="7" r="3.5" fill="white"/>
</g>
