<g transform="translate(780,260)" filter="url(#sh)">
  <circle r="22" fill="#10b981"/>
  <ellipse cx="0" cy="-5" rx="9" ry="3.5" fill="none" stroke="white" stroke-width="1.6"/>
  <line x1="-9" y1="-5" x2="-9" y2="5" stroke="white" stroke-width="1.6"/>
  <line x1="9" y1="-5" x2="9" y2="5" stroke="white" stroke-width="1.6"/>
  <ellipse cx="0" cy="5" rx="9" ry="3.5" fill="none" stroke="white" stroke-width="1.6"/>
</g>
<text x="780" y="293" class="sn">MongoDB</text>
<text x="780" y="305" class="st">Status: Ready to Apply</text>

<!-- Arrow: GitHub → MongoDB update (more prominent) -->
<line x1="898" y1="260" x2="804" y2="260" stroke="#10b981" stroke-width="1.8" marker-end="url(#arrG)"/>
<text x="851" y="250" style="font-size:8.5px;fill:#16a34a;text-anchor:middle;font-weight:600">Update Status</text>

