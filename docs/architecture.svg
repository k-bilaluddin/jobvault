<path d="M758,270 L700,270 Q680,270 680,250 Q680,240 550,240 L490,240 L475,175" fill="none" stroke="#ea580c" stroke-width="1.2" opacity="0.55" stroke-dasharray="8,5" marker-end="url(#arrO)"/>
<text x="590" y="255" style="font-size:7.5px;fill:#ea580c;font-family:'Cascadia Code',monospace;text-anchor:middle;opacity:0.8">Publish: job.application.created + notification.new</text>

<!-- ═══ API BOUNDARY (SSE) ═══ -->
<rect x="300" y="430" width="750" height="200" rx="12" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1.5" stroke-dasharray="6,4"/>
<text x="314" y="446" class="zl">API SERVICE — SSE NOTIFICATIONS</text>
<text x="314" y="458" style="font-size:8px;fill:#64748b">Hosted in JobVault.API process</text>

