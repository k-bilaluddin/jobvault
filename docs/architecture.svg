<text x="1370" y="200" class="st" text-anchor="middle">Private · 6-file atomic commit</text>

<!-- RabbitMQ Consumer (840,264) -->
<g transform="translate(840,264)" filter="url(#sh)">
  <circle r="28" fill="#16a34a"/>
  <circle cx="0" cy="0" r="13" fill="none" stroke="white" stroke-width="2"/>
  <polygon points="-5,-9 12,0 -5,9" fill="white"/>
</g>
<text x="840" y="306" class="sn" text-anchor="middle">RabbitMQ Consumer</text>
<text x="840" y="320" class="st" text-anchor="middle">created · updated queue</text>

