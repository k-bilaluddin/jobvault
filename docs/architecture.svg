<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="680" viewBox="0 0 1500 680">
<defs>
<style>
  text{font-family:"Segoe UI",Arial,sans-serif}
  .sn{font-size:11.5px;font-weight:700;fill:#1e293b}
  .st{font-size:10px;fill:#64748b}
  .al{font-size:9px;fill:#475569}
  .alB{font-size:9px;fill:#3b82f6}
  .alG{font-size:9px;fill:#16a34a}
  .alP{font-size:9px;fill:#7c3aed}
  .alR{font-size:9px;fill:#dc2626}
  .zl{font-size:10px;font-weight:700;fill:#94a3b8;letter-spacing:.8px}
</style>
<marker id="arr"  markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3z" fill="#94a3b8"/></marker>
<marker id="arrB" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3z" fill="#3b82f6"/></marker>
<marker id="arrG" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3z" fill="#16a34a"/></marker>
<marker id="arrP" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3z" fill="#7c3aed"/></marker>
<marker id="arrD" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3z" fill="#94a3b8"/></marker>
<marker id="arrR" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3z" fill="#dc2626"/></marker>
<filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="3.5" flood-color="#00000014"/></filter>
</defs>

<!-- Background -->
<rect width="1500" height="680" fill="#f8fafc"/>

<!-- Header -->
<rect width="1500" height="52" fill="#0f172a"/>
<text x="22" y="28" style="font-size:19px;font-weight:700;fill:#f8fafc;font-family:'Segoe UI',Arial">JobVault</text>
<text x="130" y="29" style="font-size:13px;fill:#94a3b8;font-family:'Segoe UI',Arial">— Event-driven job application automation</text>
<text x="22" y="45" style="font-size:10.5px;fill:#475569;font-family:'Segoe UI',Arial">Claude → API → RabbitMQ → Worker Pipeline → GitHub Vault → Real-time Notifications</text>

<!-- Zone backgrounds -->
<rect x="28" y="96" width="648" height="196" rx="12" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1"/>
<text x="42" y="113" class="zl">INPUT &amp; INGESTION</text>

<rect x="808" y="96" width="672" height="100" rx="12" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
<text x="822" y="113" class="zl">PROCESSING PIPELINE</text>

<text x="822" y="253" class="zl">EVENT FAN-OUT</text>

<rect x="808" y="366" width="672" height="100" rx="12" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1"/>
<text x="822" y="383" class="zl">SSE NOTIFICATIONS</text>

<!-- ── Arrows ── -->

<!-- You → Claude AI -->
<line x1="108" y1="264" x2="242" y2="264" stroke="#6366f1" stroke-width="1.6" marker-end="url(#arr)"/>
<text x="175" y="257" class="al" text-anchor="middle">job URL</text>

<!-- Claude AI → API -->
<line x1="298" y1="264" x2="432" y2="264" stroke="#3b82f6" stroke-width="1.6" marker-end="url(#arrB)"/>
<text x="365" y="257" class="alB" text-anchor="middle">POST /ingest</text>

<!-- API → RabbitMQ -->
<line x1="488" y1="264" x2="622" y2="264" stroke="#3b82f6" stroke-width="1.6" marker-end="url(#arrB)"/>
<text x="555" y="257" class="alB" text-anchor="middle">publish received</text>

<!-- RabbitMQ → Ingestion Consumer -->
<line x1="674" y1="246" x2="814" y2="158" stroke="#16a34a" stroke-width="1.6" marker-end="url(#arrG)"/>
<text x="738" y="191" class="alG" text-anchor="middle" transform="rotate(-28,738,191)">received queue</text>

<!-- RabbitMQ → RabbitMQ Consumer -->
<line x1="678" y1="264" x2="812" y2="264" stroke="#16a34a" stroke-width="1.6" marker-end="url(#arrG)"/>
<text x="745" y="257" class="alG" text-anchor="middle">created/updated</text>

<!-- RabbitMQ → SSE Consumer -->
<line x1="674" y1="282" x2="814" y2="388" stroke="#7c3aed" stroke-width="1.6" marker-end="url(#arrP)"/>
<text x="736" y="344" class="alP" text-anchor="middle" transform="rotate(28,736,344)">notification.#</text>

<!-- RabbitMQ → DLQ -->
<line x1="664" y1="290" x2="824" y2="518" stroke="#dc2626" stroke-width="1.3" stroke-dasharray="4,3" marker-end="url(#arrR)"/>
<text x="726" y="424" class="alR" text-anchor="middle" transform="rotate(36,726,424)">NACK → DLQ</text>

<!-- Ingestion → Generation Service -->
<line x1="868" y1="144" x2="992" y2="144" stroke="#16a34a" stroke-width="1.6" marker-end="url(#arrG)"/>
<text x="930" y="137" class="alG" text-anchor="middle">HTTP call</text>

<!-- Generation Service → LibreOffice -->
<line x1="1048" y1="144" x2="1162" y2="144" stroke="#16a34a" stroke-width="1.6" marker-end="url(#arrG)"/>
<text x="1105" y="137" class="alG" text-anchor="middle">DOCX bytes</text>

<!-- LibreOffice → GitHub Vault -->
<line x1="1218" y1="144" x2="1342" y2="144" stroke="#16a34a" stroke-width="1.6" marker-end="url(#arrG)"/>
<text x="1280" y="137" class="alG" text-anchor="middle">commit 6 files</text>

<!-- GitHub Vault → MongoDB -->
<line x1="1370" y1="172" x2="1370" y2="236" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrD)"/>
<text x="1380" y="207" class="al">status update</text>

<!-- RabbitMQ Consumer → Telegram -->
<line x1="868" y1="264" x2="982" y2="264" stroke="#7c3aed" stroke-width="1.6" marker-end="url(#arrP)"/>
<text x="925" y="257" class="alP" text-anchor="middle">alert</text>

<!-- SSE Consumer → Notifications DB -->
<line x1="868" y1="404" x2="992" y2="404" stroke="#7c3aed" stroke-width="1.6" marker-end="url(#arrP)"/>
<text x="930" y="397" class="alP" text-anchor="middle">save notif</text>

<!-- Notifications DB → SSE Hub -->
<line x1="1048" y1="404" x2="1162" y2="404" stroke="#7c3aed" stroke-width="1.6" marker-end="url(#arrP)"/>
<text x="1105" y="397" class="alP" text-anchor="middle">broadcast</text>

<!-- SSE Hub → Vue 3 UI -->
<line x1="1218" y1="404" x2="1342" y2="404" stroke="#7c3aed" stroke-width="1.6" marker-end="url(#arrP)"/>
<text x="1280" y="397" class="alP" text-anchor="middle">SSE stream</text>

<!-- Publish-created feedback loop -->
<path d="M1370,292 C1370,630 650,630 650,292" fill="none" stroke="#94a3b8" stroke-width="1.3" stroke-dasharray="5,4" marker-end="url(#arrD)"/>
<text x="1010" y="646" class="al" text-anchor="middle">publish created event (after vault commit)</text>

<!-- ── Nodes ── -->

<!-- You (80,264) -->
<g transform="translate(80,264)" filter="url(#sh)">
  <circle r="28" fill="#6366f1"/>
  <circle cx="0" cy="-8" r="8" fill="white"/>
  <path d="M-13,14 Q-13,2 0,2 Q13,2 13,14Z" fill="white"/>
</g>
<text x="80" y="306" class="sn" text-anchor="middle">You</text>
<text x="80" y="320" class="st" text-anchor="middle">Job URL · decide</text>

<!-- Claude AI (270,264) -->
<g transform="translate(270,264)" filter="url(#sh)">
  <circle r="28" fill="#6366f1"/>
  <path d="M0,-14 L3,-3 L14,0 L3,3 L0,14 L-3,3 L-14,0 L-3,-3Z" fill="white"/>
</g>
<text x="270" y="306" class="sn" text-anchor="middle">Claude AI</text>
<text x="270" y="320" class="st" text-anchor="middle">Evaluate · score · build</text>

<!-- JobVault API (460,264) -->
<g transform="translate(460,264)" filter="url(#sh)">
  <circle r="28" fill="#3b82f6"/>
  <rect x="-13" y="-12" width="26" height="7" rx="1.5" fill="white"/>
  <rect x="-13" y="-2" width="26" height="7" rx="1.5" fill="white"/>
  <rect x="-13" y="8" width="26" height="7" rx="1.5" fill="white"/>
</g>
<text x="460" y="306" class="sn" text-anchor="middle">JobVault API</text>
<text x="460" y="320" class="st" text-anchor="middle">.NET 9 · ASP.NET Core</text>

<!-- RabbitMQ (650,264) -->
<g transform="translate(650,264)" filter="url(#sh)">
  <circle r="28" fill="#f97316"/>
  <rect x="-14" y="-9" width="28" height="20" rx="2" fill="none" stroke="white" stroke-width="2"/>
  <polyline points="-14,-9 0,5 14,-9" fill="none" stroke="white" stroke-width="2"/>
</g>
<text x="650" y="306" class="sn" text-anchor="middle">RabbitMQ</text>
<text x="650" y="320" class="st" text-anchor="middle">Topic exchange · DLX</text>

<!-- Ingestion Consumer (840,144) -->
