<g transform="translate(1020,264)" filter="url(#sh)">
  <circle r="28" fill="#7c3aed"/>
  <polygon points="-14,7 14,0 -14,-7" fill="white"/>
  <polygon points="-14,7 -4,2 -3,9" fill="#7c3aed"/>
</g>
<text x="1020" y="306" class="sn" text-anchor="middle">Telegram Bot</text>
<text x="1020" y="320" class="st" text-anchor="middle">Push notification</text>

