<circle cx="1120" cy="192" r="5" fill="#10b981"/><text x="1132" y="195" style="font-size:8.5px;fill:#475569">MongoDB (persistence)</text>
<circle cx="1120" cy="210" r="5" fill="#ef4444"/><text x="1132" y="213" style="font-size:8.5px;fill:#475569">Dead letter queue</text>

<rect x="1114" y="228" width="80" height="12" rx="3" fill="#fff7ed" stroke="#fdba74" stroke-width="0.8"/>
