  <rect x="-10" y="6" width="20" height="5.5" rx="1.5" fill="white"/>
</g>
<text x="330" y="133" class="node-label">JobVault API</text>
<text x="330" y="145" class="node-sub">.NET 9 · 202 Accepted</text>

<!-- Arrow: API → Pipeline -->
<line x1="352" y1="100" x2="498" y2="100" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#a3)"/>

