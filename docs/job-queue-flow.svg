</g>
<text x="378" y="263" class="node-label">Routine</text>
<text x="378" y="274" class="node-sub">Hourly · scheduled</text>

<!-- Arrow: Routine → Agent (loops up) -->
<path d="M378,212 L378,165 L190,165 L190,122" fill="none" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#a4)"/>
