<svg viewBox="0 0 1100 700" xmlns="http://www.w3.org/2000/svg" role="img">
<title>JobVault — How It Works</title>
<desc>Two input paths converge at the JobVault pipeline, which outputs four documents to the dashboard where you apply.</desc>

<defs>
<style>
  text { font-family: "Segoe UI", system-ui, Arial, sans-serif; }
  .node-label { font-size: 11.5px; font-weight: 600; fill: #1e293b; text-anchor: middle; }
  .node-sub { font-size: 9px; fill: #64748b; text-anchor: middle; }
  .edge-label { font-size: 8.5px; fill: #475569; text-anchor: middle; }
  .zone-label { font-size: 9px; font-weight: 700; fill: #94a3b8; letter-spacing: 1px; }
  .badge { font-size: 7.5px; font-weight: 700; letter-spacing: 0.5px; text-anchor: middle; }
  .file-title { font-size: 10px; font-weight: 600; fill: #1e293b; text-anchor: middle; }
  .file-sub { font-size: 8px; fill: #64748b; text-anchor: middle; }
  .pipe-step { font-size: 8.5px; fill: #92400e; }
  .pipe-num { font-size: 8px; font-weight: 700; fill: #d97706; }
</style>
<marker id="a1" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L0,7 L7,3.5z" fill="#94a3b8"/></marker>
<marker id="a2" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L0,7 L7,3.5z" fill="#6366f1"/></marker>
<marker id="a3" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L0,7 L7,3.5z" fill="#3b82f6"/></marker>
<marker id="a4" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L0,7 L7,3.5z" fill="#16a34a"/></marker>
<marker id="a5" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L0,7 L7,3.5z" fill="#0284c7"/></marker>
<filter id="sh"><feDropShadow dx="0" dy="1.5" stdDeviation="2" flood-color="#00000010"/></filter>
<filter id="sh2"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000012"/></filter>
</defs>

<!-- Background -->
<rect width="1100" height="700" fill="#f8fafc"/>

<!-- Header -->
<rect width="1100" height="42" fill="#0f172a"/>
<text x="20" y="23" style="font-size:15px;font-weight:700;fill:#f8fafc">JobVault</text>
<text x="105" y="24" style="font-size:11px;fill:#94a3b8">— How it works</text>
<text x="20" y="37" style="font-size:9px;fill:#475569">Two paths to the same pipeline: paste a URL manually, or queue URLs and let the Routine handle it</text>

<!-- ═══ YOU NODE ═══ -->
<g transform="translate(55,195)" filter="url(#sh)">
  <circle r="26" fill="#6366f1"/>
  <circle cx="0" cy="-7" r="7" fill="white"/>
  <path d="M-11,11 Q-11,2 0,2 Q11,2 11,11Z" fill="white"/>
</g>
<text x="55" y="232" class="node-label">You</text>
<text x="55" y="244" class="node-sub">Find jobs to apply</text>

<!-- ═══ MANUAL PATH ═══ -->
<rect x="115" y="58" width="370" height="80" rx="10" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1"/>
<text x="128" y="73" class="zone-label">MANUAL PATH</text>
<rect x="410" y="61" width="48" height="15" rx="3" fill="#6366f1" opacity="0.12"/>
<text x="434" y="71" class="badge" style="fill:#6366f1">MANUAL</text>

<!-- Arrow: You → Agent (manual) -->
<path d="M78,178 L155,105" fill="none" stroke="#6366f1" stroke-width="1.5" marker-end="url(#a2)"/>
<text x="100" y="133" class="edge-label" style="fill:#6366f1">paste URL</text>

<!-- Claude Agent -->
<g transform="translate(190,100)" filter="url(#sh)">
  <circle r="22" fill="#6366f1"/>
  <path d="M0,-10 L2.5,-2 L10,0 L2.5,2 L0,10 L-2.5,2 L-10,0 L-2.5,-2Z" fill="white"/>
</g>
<text x="190" y="133" class="node-label">Claude Agent</text>
<text x="190" y="145" class="node-sub">Evaluate · score · build payload</text>

<!-- Arrow: Agent → API -->
<line x1="212" y1="100" x2="300" y2="100" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#a3)"/>
<text x="256" y="93" class="edge-label">POST /ingest</text>

<!-- API -->
<g transform="translate(330,100)" filter="url(#sh)">
