<text x="278" y="263" class="node-label">Job Queue</text>
<text x="278" y="274" class="node-sub">pending_jobs</text>

<!-- Arrow: Queue → Routine -->
<line x1="298" y1="232" x2="348" y2="232" stroke="#16a34a" stroke-width="1.5" marker-end="url(#a4)"/>

<!-- Routine -->
<g transform="translate(378,232)" filter="url(#sh)">
