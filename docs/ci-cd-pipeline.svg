<!-- Split arrows -->
<line x1="240" y1="182" x2="140" y2="210" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#a1)"/>
<line x1="320" y1="182" x2="420" y2="210" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#a1)"/>

<!-- Backend path with .NET icon -->
<rect x="60" y="212" width="160" height="60" rx="8" fill="#dbeafe" stroke="#93c5fd" stroke-width="1" filter="url(#sh)"/>
<g transform="translate(82,237)">
  <circle r="12" fill="#512BD4"/>
  <text x="0" y="4" style="font-size:7px;font-weight:800;fill:white;text-anchor:middle">.NET</text>
</g>
<text x="150" y="232" class="node-label">Backend</text>
<text x="150" y="244" class="step-sub">.NET 9 · Restore · Build</text>
<text x="150" y="256" class="step-sub">Unit Tests (129)</text>
<text x="150" y="266" class="step-sub">Architecture Tests (19)</text>

<!-- Frontend path with Node icon -->
<rect x="340" y="212" width="160" height="60" rx="8" fill="#dcfce7" stroke="#86efac" stroke-width="1" filter="url(#sh)"/>
<g transform="translate(362,237)">
  <circle r="12" fill="#339933"/>
  <text x="0" y="4" style="font-size:7px;font-weight:800;fill:white;text-anchor:middle">JS</text>
</g>
<text x="430" y="232" class="node-label">Frontend</text>
<text x="430" y="244" class="step-sub">Node.js 22 · npm ci</text>
<text x="430" y="256" class="step-sub">Vitest (97 tests)</text>

<!-- Parallel badge -->
<rect x="234" y="228" width="52" height="14" rx="3" fill="#6366f1" opacity="0.15"/>
<text x="260" y="238" class="badge" style="fill:#6366f1">PARALLEL</text>

<!-- Converge arrows -->
<line x1="140" y1="272" x2="280" y2="304" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#a1)"/>
<line x1="420" y1="272" x2="280" y2="304" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#a1)"/>

<!-- CI passes -->
<rect x="190" y="306" width="180" height="36" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5" filter="url(#sh)"/>
<g transform="translate(210,324)">
  <circle r="10" fill="#16a34a"/>
  <path d="M-4,0 L-1,3 L5,-3" fill="none" stroke="white" stroke-width="2"/>
</g>
<text x="295" y="328" class="node-label" style="fill:#16a34a">CI Passes</text>

<text x="280" y="360" class="step-sub">Only changed layers run — unchanged layers skip</text>

