<svg viewBox="0 0 1100 720" xmlns="http://www.w3.org/2000/svg" role="img">
<title>JobVault — CI/CD Pipeline</title>
<desc>Full CI/CD pipeline with tech icons: path-based CI, parallel Docker builds, self-hosted deployment, Cloudflare Pages frontend.</desc>

<defs>
<style>
  text { font-family: "Segoe UI", system-ui, Arial, sans-serif; }
  .node-label { font-size: 11px; font-weight: 600; fill: #1e293b; text-anchor: middle; }
  .node-sub { font-size: 9px; fill: #64748b; text-anchor: middle; }
  .edge-label { font-size: 8px; fill: #475569; text-anchor: middle; }
  .zone-label { font-size: 9px; font-weight: 700; fill: #94a3b8; letter-spacing: 1px; }
  .badge { font-size: 7.5px; font-weight: 700; letter-spacing: 0.5px; text-anchor: middle; }
  .step-text { font-size: 9px; fill: #1e293b; text-anchor: middle; }
  .step-sub { font-size: 8px; fill: #64748b; text-anchor: middle; }
</style>
<marker id="a1" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L0,7 L7,3.5z" fill="#94a3b8"/></marker>
<marker id="aG" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L0,7 L7,3.5z" fill="#16a34a"/></marker>
<marker id="aO" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L0,7 L7,3.5z" fill="#f97316"/></marker>
<filter id="sh"><feDropShadow dx="0" dy="1.5" stdDeviation="2" flood-color="#00000010"/></filter>
<filter id="sh2"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000012"/></filter>
</defs>

<!-- Background -->
<rect width="1100" height="720" fill="#f8fafc"/>

<!-- Header -->
<rect width="1100" height="42" fill="#0f172a"/>
<text x="20" y="23" style="font-size:15px;font-weight:700;fill:#f8fafc">JobVault</text>
<text x="105" y="24" style="font-size:11px;fill:#94a3b8">— CI/CD Pipeline</text>
<text x="20" y="37" style="font-size:9px;fill:#94a3b8">Push → CI → Build → Deploy → Notify · Two environments: production (master) and staging (develop)</text>

