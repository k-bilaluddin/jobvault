  <path d="M0,-7 C-4,-7 -7,-4 -7,0 C-7,3.2 -5,5.8 -2.2,6.6 C-1.8,6.7 -1.6,6.5 -1.6,6.3 C-1.6,6.1 -1.6,5.4 -1.6,4.7 C-4,5.2 -4.8,3.7 -4.8,3.7 C-5.2,3 -5.7,2.8 -5.7,2.8 C-6.4,2.3 -5.7,2.3 -5.7,2.3 C-5,2.4 -4.6,3 -4.6,3 C-3.9,4 -2.8,3.7 -1.6,3.5 C-1.5,3 -1.3,2.6 -1,2.4 C-3.3,2.1 -5.6,1.3 -5.6,-2.2 C-5.6,-3.1 -5.3,-3.8 -4.6,-4.4 C-4.7,-4.6 -5.1,-5.5 -4.5,-6.7 C-4.5,-6.7 -3.8,-6.9 -1.6,-5.8 C-1,-6 -0.5,-6 0,-6 C0.5,-6 1,-6 1.6,-5.8 C3.8,-6.9 4.5,-6.7 4.5,-6.7 C5.1,-5.5 4.7,-4.6 4.6,-4.4 C5.3,-3.8 5.6,-3.1 5.6,-2.2 C5.6,1.3 3.3,2.1 1,2.4 C1.4,2.7 1.6,3.3 1.6,4.2 C1.6,5.4 1.6,6.1 1.6,6.3 C1.6,6.5 1.8,6.7 2.2,6.6 C5,5.8 7,3.2 7,0 C7,-4 4,-7 0,-7Z" fill="white"/>
</g>
