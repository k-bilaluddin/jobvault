<rect x="120" y="598" width="320" height="28" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="0.8"/>
<text x="280" y="616" class="step-text">Write .env from GitHub Secrets → docker compose pull → up -d</text>

<line x1="280" y1="626" x2="280" y2="644" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#a1)"/>

