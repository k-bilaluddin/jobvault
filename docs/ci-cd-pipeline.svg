<rect x="30" y="410" width="500" height="290" rx="10" fill="#fefce8" stroke="#fde68a" stroke-width="1"/>
<text x="44" y="426" class="zone-label">CONTINUOUS DEPLOYMENT — BACKEND</text>
<text x="44" y="438" style="font-size:8px;fill:#64748b">cd.yml (production) · cd-staging.yml (staging)</text>

<!-- Arrow from CI to CD -->
