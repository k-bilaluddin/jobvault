name: jobvault-prod

services:
  api:
    image: ghcr.io/k-bilaluddin/jobvault-api:latest
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: jobvault-api
    ports:
      - "5000:8080"
    env_file:
      - .env
    environment:
      - APP_VAULT_ROOT_DIR=/app/vault
    volumes:
      - ${APP_VAULT_ROOT_DIR}:/app/vault
    restart: unless-stopped
    networks:
      - prod
      - jobvault-internal

  worker:
    image: ghcr.io/k-bilaluddin/jobvault-worker:latest
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    container_name: jobvault-worker
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      - api
    networks:
      - prod
      - jobvault-internal

networks:
  prod:
    name: jobvault-prod
  jobvault-internal:
    external: true
