services:
  api:
    image: ghcr.io/k-bilaluddin/jobvault-api:latest
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: jobvault-api
    ports:
      - "5000:8080"
    environment:
      - Auth__Email=${Auth__Email}
      - Auth__PasswordHash=${Auth__PasswordHash}
      - Auth__JwtSecret=${Auth__JwtSecret}
      - Auth__TokenExpiryDays=${Auth__TokenExpiryDays:-7}
      - Demo__Email=${Demo__Email:-}
      - Demo__PasswordHash=${Demo__PasswordHash:-}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
    env_file:
      - .env
    restart: unless-stopped

  worker:
    image: ghcr.io/k-bilaluddin/jobvault-worker:latest
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    container_name: jobvault-worker
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      - api
    networks:
      - default
      - jobvault-internal

networks:
  # Must be created once before first `docker-compose up`:
  #   docker network create jobvault-internal
  jobvault-internal:
    external: true
